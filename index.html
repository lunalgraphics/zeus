<!DOCTYPE html>
<html>
    <head>
        <title>Zeus</title>
        <meta name="description" content="Noise-based Lightning Renderer" />
        <meta name="keywords" content="Lightning, VFX, Rendering" />
        <meta name="author" content="Yikuan Sun" />
        <link rel="icon" href="icon.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <center>
            <button id="exportPNG">Export PNG</button>
            <br />
            <div id="previewSpace" style="width: 600px;">
                <canvas id="baseCanv" width="2000" height="1000" style="width: 100%; display: none;"></canvas>
                <canvas id="displacementMapCanv" width="2000" height="1000" style="width: 100%; display: none;"></canvas>
                <canvas id="glowCanv" width="2000" height="1000" style="width: 100%; display: none;"></canvas>
                <canvas id="finalCanv" width="2000" height="1000" style="width: 100%;"></canvas>
            </div>
            Preset: <select id="presetselector"></select> <br />
        </center>
        <div id="options" x-data>
            <template x-for="[sectionName, fields] in Object.entries($store.lightning.sections)" :key="sectionName">
                <div x-data="{ open: false }">
                    <b @click="open = !open" x-text="sectionName"></b>
                    <div x-show="open" x-collapse>
                        <table style="width: 100%;">
                            <template x-for="field in fields" :key="field.key">
                                <tr>
                                    <td>
                                        <label :for="field.key" class="ygui-label" x-text="field.label"></label>
                                    </td>
                                    <td style="width: 1px;">
                                        <!-- Select fields -->
                                        <template x-if="field.type === 'select'">
                                            <select
                                                :id="field.key"
                                                class="ygui-input"
                                                x-model="$store.lightning.options[field.key]"
                                                @change.throttle.20ms="$store.lightning.render()"
                                            >
                                                <template x-for="opt in field.options" :key="opt">
                                                    <option :value="opt" x-text="opt"></option>
                                                </template>
                                            </select>
                                        </template>
                                        <!-- Input fields (number, color, etc.) -->
                                        <template x-if="field.type !== 'select'">
                                            <input
                                                :id="field.key"
                                                :type="field.type"
                                                class="ygui-input"
                                                x-model="$store.lightning.options[field.key]"
                                                @input.throttle.20ms="$store.lightning.render()"
                                                :step="field.attr?.step"
                                                :min="field.attr?.min"
                                                :max="field.attr?.max"
                                            />
                                        </template>
                                    </td>
                                </tr>
                            </template>
                        </table>
                    </div>
                </div>
            </template>
        </div>
        
        <script type="module" src="./src/main.js"></script>
    </body>
</html>
