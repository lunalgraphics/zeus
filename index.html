<!DOCTYPE html>
<html>
    <head>
        <title>Zeus</title>
        <meta name="description" content="Noise-based Lightning Renderer" />
        <meta name="keywords" content="Lightning, VFX, Rendering" />
        <meta name="author" content="Yikuan Sun" />
        <link rel="icon" href="icon.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css" />
        <script src="./lib/ygui.min.js"></script>
    </head>
    <body>
        <center>
            <button id="exportPNG">Export PNG</button>
            <br />
            <div id="previewSpace" style="width: 600px;">
                <canvas id="baseCanv" width="2000" height="1000" style="width: 100%; display: none;"></canvas>
                <canvas id="displacementMapCanv" width="2000" height="1000" style="width: 100%; display: none;"></canvas>
                <canvas id="glowCanv" width="2000" height="1000" style="width: 100%; display: none;"></canvas>
                <canvas id="finalCanv" width="2000" height="1000" style="width: 100%;"></canvas>
            </div>
            Preset: <select id="presetselector"></select> <br />
        </center>
        <div id="options">
            <div x-data="{ open: false }">
              <b @click="open = !open">Dimensions</b>
              <div x-show="open" x-collapse id="Dimensions"></div>
            </div>
            <div x-data="{ open: false }">
              <b @click="open = !open">Twitch</b>
              <div x-show="open" x-collapse id="Twitch"></div>
            </div>
            <div x-data="{ open: false }">
              <b @click="open = !open">Branches</b>
              <div x-show="open" x-collapse id="Branches"></div>
            </div>
            <div x-data="{ open: false }">
              <b @click="open = !open">Core</b>
              <div x-show="open" x-collapse id="Core"></div>
            </div>
            <div x-data="{ open: false }">
              <b @click="open = !open">Glow</b>
              <div x-show="open" x-collapse id="Glow"></div>
            </div>
            <div x-data="{ open: false }">
              <b @click="open = !open">Glow Distortion</b>
              <div x-show="open" x-collapse id="Glow_Distortion"></div>
            </div>
        </div>
        
        <script type="module" src="./src/main.js"></script>
    </body>
</html>
