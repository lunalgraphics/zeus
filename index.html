<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Zeus</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Noise-based Lightning Renderer" />
        <meta name="keywords" content="Lightning, VFX, Rendering" />
        <meta name="author" content="Yikuan Sun" />
        <link rel="icon" href="icon.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="preview-container">
            <button id="exportPNG">Export PNG</button>
            <div id="previewSpace">
                <canvas id="baseCanv" width="2000" height="1000" style="display: none;"></canvas>
                <canvas id="displacementMapCanv" width="2000" height="1000" style="display: none;"></canvas>
                <canvas id="glowCanv" width="2000" height="1000" style="display: none;"></canvas>
                <canvas id="finalCanv" width="2000" height="1000"></canvas>
            </div>
            <div class="preset-row">
                Preset: <select id="presetselector"></select>
            </div>
        </div>
        <div id="options">
            <b>Dimensions</b>
            <div id="Dimensions"></div>
            <b>Twitch</b>
            <div id="Twitch"></div>
            <b>Branches</b>
            <div id="Branches"></div>
            <b>Realistic</b>
            <div id="Realistic"></div>
            <b>Core</b>
            <div id="Core"></div>
            <b>Glow</b>
            <div id="Glow"></div>
            <b>Glow Distortion</b>
            <div id="Glow_Distortion"></div>
        </div>

        <!-- Vendor libs (non-module, loaded before app) -->
        <script src="lib/ygui.min.js"></script>

        <!-- App entry point -->
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
