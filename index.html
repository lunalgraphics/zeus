<!DOCTYPE html>
<html>
    <head>
        <title>Zeus</title>
        <meta name="description" content="Noise-based Lightning Renderer" />
        <meta name="keywords" content="Lightning, VFX, Rendering" />
        <meta name="author" content="Yikuan Sun" />
        <link rel="icon" href="icon.png" />
        <link rel="stylesheet" href="./src/style.css" />
    </head>
    <body>
        <center>
            <button id="exportPNG">Export PNG</button>
            <br />
            <div id="previewSpace" style="width: 600px;">
                <canvas id="baseCanv" width="2000" height="1000" style="width: 100%; display: none;"></canvas>
                <canvas id="displacementMapCanv" width="2000" height="1000" style="width: 100%; display: none;"></canvas>
                <canvas id="glowCanv" width="2000" height="1000" style="width: 100%; display: none;"></canvas>
                <canvas id="finalCanv" width="2000" height="1000" style="width: 100%;"></canvas>
            </div>
            <div x-data="{ pickerOpen: false }" :style="{ display: 'inline-block', position: 'relative', zIndex: 2 }">
                <button :style="{ position: 'relative', color: pickerOpen ? 'deepskyblue' : '', borderColor: pickerOpen ? 'deepskyblue' : '' }" @click="pickerOpen = !pickerOpen">Select a Preset <span :style="{ marginLeft: '4px', fontSize: 'smaller', }">&#x25BC;</span></button>
                <div x-show="pickerOpen" :style="{ position: 'absolute', top: 'calc(100% - 7px)', left: '50%', transform: 'translateX(-50%)', backgroundColor: 'var(--bg-color)', width: 'calc(100% - 16px)', border: '1px solid #88888844', borderRadius: '4px', overflow: 'hidden', }"
                    @click.outside="pickerOpen = false;">
                    <template x-for="[presetName, preset] in Object.entries($store.availPresets)" :key="presetName">
                        <button @click="$store.setPreset(preset); pickerOpen = false;" x-text="presetName" :style="{ width: '100%', margin: 0, border: 0, borderBottom: '1px solid #88888844', borderRadius: 0, }"></button>
                    </template>
                </div>
            </div>
        </center>
        <div id="options" x-data="{ focusedKey: null }">
            <template x-for="[sectionName, fields] in Object.entries($store.lightning.sections)" :key="sectionName">
                <div x-data="{ open: false }">
                    <b @click="open = !open" x-text="sectionName" :style="{ color: open ? 'deepskyblue' : '' }"></b>
                    <div x-show="open" x-collapse>
                        <table style="width: 100%;">
                            <template x-for="field in fields" :key="field.key">
                                <tr>
                                    <td>
                                        <label :for="field.key" class="ygui-label" x-text="field.label"
                                            :title="field.tooltip"
                                            :style="{ color: focusedKey === field.key ? 'deepskyblue' : '' }"
                                        ></label>
                                    </td>
                                    <td style="width: 1px;">
                                        <!-- Select fields -->
                                        <template x-if="field.type === 'select'">
                                            <select
                                                :id="field.key"
                                                class="ygui-input"
                                                :title="field.tooltip"
                                                x-model="$store.lightning.options[field.key]"
                                                @change.throttle.20ms="$store.lightning.render()"
                                                @change.debounce.20ms="$store.lightning.render()"
                                                @focus="focusedKey = field.key"
                                                @blur="if (focusedKey === field.key) focusedKey = null"
                                            >
                                                <template x-for="opt in field.options" :key="opt">
                                                    <option :value="opt" x-text="opt" :selected="$store.lightning.options[field.key] === opt"></option>
                                                </template>
                                            </select>
                                        </template>
                                        <!-- Input fields (number, color, etc.) -->
                                        <template x-if="field.type !== 'select'">
                                            <input
                                                :id="field.key"
                                                :type="field.type"
                                                class="ygui-input"
                                                :title="field.tooltip"
                                                x-model="$store.lightning.options[field.key]"
                                                @input.throttle.20ms="$store.lightning.render()"
                                                @input.debounce.20ms="$store.lightning.render()"
                                                :step="field.attr?.step"
                                                :min="field.attr?.min"
                                                :max="field.attr?.max"
                                                @focus="focusedKey = field.key"
                                                @blur="if (focusedKey === field.key) focusedKey = null"
                                            />
                                        </template>
                                    </td>
                                </tr>
                            </template>
                        </table>
                        <br />
                    </div>
                </div>
            </template>
        </div>
        
        <script type="module" src="./src/main.js"></script>
    </body>
</html>
